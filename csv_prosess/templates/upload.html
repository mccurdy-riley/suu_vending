{% extends "base.html" %}
{% block content %}

    <h2>Vending Sales Report</h2>
    <p style="color: #64748b;">Upload your <strong>Cashless Transactions.csv</strong> to generate the 6-day window analytics.</p>

    <div class="upload-container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Generate Report</button>
        </form>
    </div>

{% endblock %}
